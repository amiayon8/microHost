version: "3.8"

services:
  microhost:
    build: .
    container_name: microhost
    expose:
      - ${API_PORT}
    environment:
      - DOMAIN=${DOMAIN}
      - API_PORT=${API_PORT}
      - SERVER_URL=https://${DOMAIN}
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY}
    volumes:
      - ./data:/app/data
      - ./apps:/var/www/apps
      - ./clamav:/var/lib/clamav
    restart: unless-stopped
