version: "3.8"

services:
  microhost:
    build: .
    container_name: microhost
    expose:
      - 80
    environment:
      - DOMAIN=localhost
      - API_PORT=80
      - VIRUSTOTAL_API_KEY=
    volumes:
      - ./data:/app/data
      - ./apps:/var/www/apps
      - ./clamav:/var/lib/clamav
    restart: unless-stopped
